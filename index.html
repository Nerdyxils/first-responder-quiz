<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Responder Exam Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E63946;
    --green: #2DC653;
    --bg: #0D0F14;
    --surface: #161920;
    --surface2: #1E2230;
    --border: #2A2F3E;
    --text: #EEF0F5;
    --muted: #7A8099;
    --accent: #4361EE;
    --accent2: #F4A261;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
  #splash { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 24px; text-align: center; gap: 20px; }
  .badge { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--accent2); background: rgba(244,162,97,0.1); border: 1px solid rgba(244,162,97,0.25); padding: 6px 14px; border-radius: 100px; }
  #splash h1 { font-family: 'Syne', sans-serif; font-size: clamp(36px, 7vw, 72px); font-weight: 800; line-height: 1.05; letter-spacing: -2px; }
  #splash h1 span { color: var(--accent); }
  #splash p { font-size: 17px; color: var(--muted); max-width: 480px; line-height: 1.6; }
  .sections-preview { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  .sec-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 28px; text-align: center; min-width: 160px; }
  .sec-card .num { font-family: 'Syne', sans-serif; font-size: 40px; font-weight: 800; color: var(--accent); line-height: 1; }
  .sec-card .label { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .start-btn { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 0.5px; background: var(--accent); color: #fff; border: none; padding: 18px 52px; border-radius: 100px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 8px 32px rgba(67,97,238,0.35); margin-top: 8px; }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(67,97,238,0.5); }
  #quiz { display: none; width: 100%; max-width: 780px; padding: 24px 20px 60px; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 20px 0 28px; gap: 16px; }
  .section-label { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent2); }
  .score-live { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--muted); }
  .score-live span { color: var(--green); }
  .progress-wrap { background: var(--surface2); border-radius: 100px; height: 6px; overflow: hidden; margin-bottom: 32px; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 100px; transition: width 0.4s ease; }
  .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 36px 36px 28px; animation: fadeUp 0.35s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .q-num { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--muted); }
  .chapter-tag { font-size: 11px; font-weight: 600; color: var(--accent2); background: rgba(244,162,97,0.1); border: 1px solid rgba(244,162,97,0.2); padding: 3px 10px; border-radius: 100px; letter-spacing: 0.5px; }
  .scenario-box { background: rgba(67,97,238,0.06); border-left: 3px solid var(--accent); border-radius: 0 10px 10px 0; padding: 14px 16px; margin-bottom: 18px; font-size: 13.5px; line-height: 1.65; color: #a8b4cc; font-style: italic; }
  .scenario-box strong { color: var(--accent2); font-style: normal; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; display: block; margin-bottom: 6px; }
  .q-text { font-size: 17px; font-weight: 500; line-height: 1.55; margin-bottom: 24px; color: var(--text); }
  .options { display: flex; flex-direction: column; gap: 12px; }
  .opt { display: flex; align-items: flex-start; gap: 14px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 14px; padding: 16px 18px; cursor: pointer; transition: border-color 0.15s, background 0.15s, transform 0.1s; text-align: left; width: 100%; }
  .opt:hover:not(.disabled) { border-color: var(--accent); background: rgba(67,97,238,0.08); transform: translateX(4px); }
  .opt.disabled { cursor: default; }
  .opt-letter { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; color: var(--muted); min-width: 22px; padding-top: 1px; }
  .opt-text { font-size: 15px; line-height: 1.5; color: var(--text); }
  .opt.correct { border-color: var(--green); background: rgba(45,198,83,0.1); }
  .opt.correct .opt-letter { color: var(--green); }
  .opt.wrong { border-color: var(--red); background: rgba(230,57,70,0.1); }
  .opt.wrong .opt-letter { color: var(--red); }
  .explanation { margin-top: 20px; background: rgba(67,97,238,0.07); border-left: 3px solid var(--accent); border-radius: 0 12px 12px 0; padding: 16px 20px; font-size: 14px; line-height: 1.65; color: #c0c8e0; display: none; }
  .explanation strong { color: var(--accent2); }
  .result-banner { display: none; align-items: center; gap: 10px; padding: 14px 18px; border-radius: 12px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; margin-top: 20px; }
  .result-banner.correct-banner { background: rgba(45,198,83,0.12); color: var(--green); border: 1px solid rgba(45,198,83,0.25); }
  .result-banner.wrong-banner { background: rgba(230,57,70,0.1); color: var(--red); border: 1px solid rgba(230,57,70,0.2); }
  .next-btn { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; background: var(--accent); color: #fff; border: none; padding: 15px 40px; border-radius: 100px; cursor: pointer; margin-top: 28px; display: none; transition: transform 0.15s; box-shadow: 0 4px 20px rgba(67,97,238,0.3); }
  .next-btn:hover { transform: translateY(-2px); }
  #results { display: none; flex-direction: column; align-items: center; text-align: center; padding: 60px 24px; gap: 32px; width: 100%; max-width: 700px; }
  #results h2 { font-family: 'Syne', sans-serif; font-size: clamp(28px, 5vw, 48px); font-weight: 800; letter-spacing: -1px; }
  .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 28px 24px; }
  .result-card .sec-title { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
  .big-score { font-family: 'Syne', sans-serif; font-size: 56px; font-weight: 800; line-height: 1; color: var(--accent); }
  .out-of { font-size: 16px; color: var(--muted); margin-top: 4px; }
  .percent-pill { display: inline-block; margin-top: 12px; padding: 4px 14px; border-radius: 100px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; }
  .pass { background: rgba(45,198,83,0.15); color: var(--green); }
  .needs-work { background: rgba(244,162,97,0.15); color: var(--accent2); }
  .fail { background: rgba(230,57,70,0.12); color: var(--red); }
  .total-card { background: linear-gradient(135deg, rgba(67,97,238,0.15), rgba(244,162,97,0.1)); border: 1px solid rgba(67,97,238,0.3); border-radius: 20px; padding: 28px 24px; width: 100%; }
  .restart-btn { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 15px 40px; border-radius: 100px; cursor: pointer; transition: border-color 0.15s; }
  .restart-btn:hover { border-color: var(--accent); }
  /* Mode selection */
  .section-cards { display: flex; gap: 18px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 720px; }
  .mode-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 26px 24px; flex: 1; min-width: 240px; max-width: 340px; display: flex; flex-direction: column; align-items: flex-start; gap: 8px; text-align: left; }
  .mode-tag { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 5px 12px; border-radius: 100px; border: 1px solid; }
  .mode-tag.tag-a { color: var(--accent); background: rgba(67,97,238,0.1); border-color: rgba(67,97,238,0.25); }
  .mode-tag.tag-b { color: var(--accent2); background: rgba(244,162,97,0.1); border-color: rgba(244,162,97,0.25); }
  .mode-card-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
  .mode-card-count { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .btn-mode { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: 0.5px; color: #fff; border: none; padding: 13px 20px; border-radius: 100px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; width: 100%; }
  .btn-mode.blue { background: var(--accent); box-shadow: 0 6px 24px rgba(67,97,238,0.35); }
  .btn-mode.blue:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(67,97,238,0.5); }
  .btn-mode.orange { background: var(--accent2); box-shadow: 0 6px 24px rgba(244,162,97,0.3); }
  .btn-mode.orange:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(244,162,97,0.45); }
  .btn-topics-toggle { background: none; border: none; color: var(--muted); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; cursor: pointer; padding: 2px 0; }
  .btn-topics-toggle:hover { color: var(--accent2); }
  .topics-panel { width: 100%; max-width: 720px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 22px 24px; }
  .topics-panel-header { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .topics-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .topic-btn { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px; padding: 9px 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: border-color 0.15s, background 0.15s; }
  .topic-btn:hover { border-color: var(--accent2); background: rgba(244,162,97,0.07); }
  .topic-name { font-size: 13px; color: var(--text); }
  .topic-count { font-family: 'Syne', sans-serif; font-size: 10px; font-weight: 700; color: var(--muted); background: var(--bg); padding: 2px 7px; border-radius: 100px; border: 1px solid var(--border); }
  .divider-row { display: flex; align-items: center; gap: 14px; width: 100%; max-width: 720px; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
  .btn-secondary { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); padding: 14px 36px; border-radius: 100px; cursor: pointer; transition: border-color 0.15s; }
  .btn-secondary:hover { border-color: var(--accent); }
  .results-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .single-result { width: 100%; max-width: 380px; }
  @media (max-width: 520px) { .q-card { padding: 24px 20px 20px; } .q-text { font-size: 16px; } .results-grid { grid-template-columns: 1fr; } .mode-card { min-width: 100%; } }
</style>
</head>
<body>

<div id="splash">
  <div class="badge">Canadian Red Cross</div>
  <h1>First Responder<br><span>Exam Prep</span></h1>
  <p>Choose a section or topic to practice. Instant feedback with full explanations on every answer.</p>

  <div class="section-cards">
    <div class="mode-card">
      <span class="mode-tag tag-a">Section A</span>
      <div class="mode-card-title">Past Exam Questions</div>
      <div class="mode-card-count">50 questions</div>
      <button class="btn-mode blue" onclick="startSection('A')">Start Mock →</button>
    </div>
    <div class="mode-card">
      <span class="mode-tag tag-b">Section B</span>
      <div class="mode-card-title">Practice Questions</div>
      <div class="mode-card-count"><span id="totalBCount">—</span> questions</div>
      <button class="btn-mode orange" onclick="startSection('B')">Start All Topics →</button>
      <button class="btn-topics-toggle" id="topicsToggleBtn" onclick="toggleTopics()">Browse by Topic ↓</button>
    </div>
  </div>

  <div id="topicsPanel" class="topics-panel" style="display:none">
    <div class="topics-panel-header">Section B — Choose a Topic</div>
    <div class="topics-grid" id="topicsGrid"></div>
  </div>

  <div class="divider-row">
    <div class="divider-line"></div>
    <span class="divider-text">or</span>
    <div class="divider-line"></div>
  </div>
  <button class="btn-secondary" onclick="startSection('full')">Run Full Quiz (A + B) →</button>
</div>

<div id="quiz">
  <div class="top-bar">
    <div class="section-label" id="sectionLabel">Section A</div>
    <div class="score-live" id="scoreLive">Score: <span>0</span></div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="q-card" id="qCard">
    <div class="q-meta">
      <span class="q-num" id="qNum">Q1</span>
      <span class="chapter-tag" id="chapterTag"></span>
    </div>
    <div id="scenarioBox"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="options"></div>
    <div class="result-banner" id="resultBanner"></div>
    <div class="explanation" id="explanation"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question →</button>
  </div>
</div>

<div id="results">
  <h2 id="resultsHeading">Quiz Complete! 🎉</h2>
  <div id="resultsContent"></div>
  <div class="results-actions">
    <button class="start-btn" onclick="tryAgain()">↺ Try Again</button>
    <button class="restart-btn" onclick="goHome()">← Choose Section</button>
  </div>
</div>

<script>
const Q = [
  // ===== SECTION A — 50 PAST EXAM QUESTIONS =====
  {s:'A',c:'Past Exam Questions',q:"What common condition is most often associated with emphysema and chronic bronchitis?",o:["Asthma","Cyanosis","Chronic obstructive pulmonary disease (COPD)","Flu"],a:2,e:"COPD is the umbrella term that includes both emphysema (damaged air sacs) and chronic bronchitis (inflamed airways). They almost always occur together."},
  {s:'A',c:'Past Exam Questions',q:"What are the Six Rights of Medication?",o:["Right person, right medication, right dosage, right time, right route, right documentation","Right person, right medication, right dosage, right date, right route, right concentration","Right person, right condition, right dosage, right date, right route, right documentation","Right person, right concentration, right dosage, right date, right route, right documentation"],a:0,e:"The Six Rights are: Person, Medication, Dosage, Time, Route, Documentation. Note 'Time' — not 'date' or 'concentration'."},
  {s:'A',c:'Past Exam Questions',q:"What is the term for a mask combined with a reservoir bag used to administer high-concentration oxygen to a patient?",o:["Bag-valve mask (BVM)","Non-rebreather mask","Nasal cannula","Resuscitation mask"],a:1,e:"A non-rebreather mask has a one-way valve and reservoir bag that delivers up to 90%+ oxygen. A BVM is used for ventilation, not just oxygen delivery to a breathing patient."},
  {s:'A',c:'Past Exam Questions',q:"Where would you apply a splint to effectively immobilize a mid-third fracture of the tibia/fibula?",o:["Ankle and lower leg","Lower leg and knee","Ankle, lower leg, and knee","Foot, ankle, lower leg, and femur"],a:2,e:"A splint must immobilize the joint above AND below the fracture. For a mid-shaft tibia/fibula fracture, you immobilize the ankle (below) and the knee (above)."},
  {s:'A',c:'Past Exam Questions',q:"When is the triage process used?",o:["When you have a patient with multiple injuries","Any time the patients outnumber the responders","When there is more than one patient at the scene","When the incident is large enough for the media to report on"],a:1,e:"Triage is triggered whenever resources (responders) are overwhelmed by the number of patients — not just at large incidents."},
  {s:'A',c:'Past Exam Questions',q:"What is the name for the condition caused by disease-producing micro-organisms, also called pathogens or germs, in the body?",o:["Herpes","HIV","Bacteria","Infection"],a:3,e:"An infection is what occurs when pathogens invade and multiply in body tissue. Bacteria and viruses are types of pathogens that CAUSE infection."},
  {s:'A',c:'Past Exam Questions',q:"What information does the acronym SAMPLE refer to?",o:["Signs and symptoms, allergies, medications, past medical history, last oral intake, and events before the incident","Signs and symptoms, activity before the incident, medications, past medical history, last similar incident, and events before the incident","Size of patient, acuteness of symptoms, meals, past medical history, last medication taken, and elevated temperature","Signs and symptoms, allergies, medications, past medical history, less concerning symptoms, and events before the incident"],a:0,e:"SAMPLE = S-Signs/symptoms, A-Allergies, M-Medications, P-Past medical history, L-Last oral intake, E-Events before the incident."},
  {s:'A',c:'Past Exam Questions',q:"What is the ratio of compressions to ventilations for two responders performing CPR on a child?",o:["5 compressions for every 1 ventilation","15 compressions for every 1 ventilation","15 compressions for every 2 ventilations","30 compressions for every 2 ventilations"],a:2,e:"Two-rescuer child CPR = 15:2. Two-rescuer adult CPR = 30:2. One-rescuer CPR (child or adult) = 30:2."},
  {s:'A',c:'Past Exam Questions',q:"A young man has fallen to the ground from a tree the height of a two-storey house. The scene is safe. What is your first responsibility in caring for this patient?",o:["Monitor vital signs","Perform head-tilt/chin-lift","Minimize movement of the head and spine","Control the bleeding from his forehead"],a:2,e:"A fall from height is a significant MOI for spinal injury. Before anything else, you must protect the spine — manual spinal motion restriction (SMR) is your first hands-on priority."},
  {s:'A',c:'Past Exam Questions',q:"A patient speaks inappropriate words, only opens eyes to verbal stimulus, and obeys your command to point to his watch. What is his Glasgow Coma Scale (GCS) score?",o:["3","6","9","12"],a:3,e:"GCS: Eyes = opens to voice = 3. Verbal = inappropriate words = 3. Motor = obeys commands = 6. Total = 3+3+6 = 12."},
  {s:'A',c:'Past Exam Questions',q:"In which of the following situations would a fore-and-aft lift be an appropriate move to use?",o:["The patient is unresponsive","The patient is significantly taller than the responder","The patient has suspected hip injuries","The patient is significantly heavier than the responder"],a:0,e:"The fore-and-aft lift is used for unresponsive patients who need to be moved quickly. It is NOT used when spinal injury is suspected."},
  {s:'A',c:'Past Exam Questions',q:"Which of the following signs or symptoms indicates a possible serious abdominal injury?",o:["Tingling and numbness in the arms and legs","Respiratory distress","Impaired vision","Vomiting blood"],a:3,e:"Vomiting blood (haematemesis) is a serious sign of internal abdominal bleeding or injury. The other options point to neurological or respiratory problems."},
  {s:'A',c:'Past Exam Questions',q:"The first two stages of shock are compensated and decompensated shock. What is the third stage?",o:["Progressing shock","Permeant shock","Irreversible shock","Fatal shock"],a:2,e:"The three stages of shock are: (1) Compensated, (2) Decompensated, (3) Irreversible. In irreversible shock, organ damage is so severe that death will occur even with treatment."},
  {s:'A',c:'Past Exam Questions',q:"Which of the following steps is NOT part of the emergency care for a responsive patient with a heat-related illness?",o:["Having the patient take salt tablets orally","Cooling the patient","Lightly stretching and massaging any muscle cramps","Providing small amounts of water or a commercial sports drink"],a:0,e:"Salt tablets are NOT recommended — they can worsen dehydration and cause nausea. Cooling, hydration, and gentle massage are all appropriate."},
  {s:'A',c:'Past Exam Questions',q:"In which of the following situations would you move a patient before providing emergency care?",o:["The patient is lying unconscious on the ground and a crowd of bystanders has gathered","The patient is sitting on a sailboat in open water complaining of chest pain","The patient is in a kayak with no pulse or breathing","The patient has collapsed unconscious in front of the ski lift and is blocking access"],a:2,e:"You move a patient BEFORE care only when the scene is dangerous or when CPR cannot be performed in place. A kayak on water prevents effective CPR — move to solid ground immediately."},
  {s:'A',c:'Past Exam Questions',q:"Which of the following is included in the Workplace Hazardous Materials Information System (WHMIS)?",o:["Worker education and training programs","The provision of Material Safety Data Sheets (MSDSs)","Clearly labelled hazardous materials, including all toxic substances","All of the above"],a:3,e:"WHMIS has three core components: worker education/training, labelling of hazardous materials, and Material Safety Data Sheets (MSDSs/SDS)."},
  {s:'A',c:'Past Exam Questions',q:"What is the ratio of compressions to ventilations in two-responder CPR for an adult?",o:["5 compressions for every 1 ventilation","15 compressions for every 1 ventilation","15 compressions for every 2 ventilations","30 compressions for every 2 ventilations"],a:3,e:"Two-rescuer adult CPR = 30:2, same as single-rescuer adult. The 15:2 ratio only applies to two-rescuer child CPR."},
  {s:'A',c:'Past Exam Questions',q:"What is the anatomical term for anything located toward the body's midline?",o:["Posterior","Superior","Lateral","Medial"],a:3,e:"Medial = toward the midline. Lateral = away from the midline. Example: the nose is medial to the ears."},
  {s:'A',c:'Past Exam Questions',q:"Which of the following is considered to be a non-shockable rhythm?",o:["Ventricular fibrillation","Ventricular tachycardia","Asystole","All of the above"],a:2,e:"Asystole (flatline) is non-shockable. VF and VT are shockable rhythms. You cannot shock a heart with no electrical activity."},
  {s:'A',c:'Past Exam Questions',q:"What is the most telling sign or symptom of a heart attack?",o:["Profuse sweating","Pale skin","Persistent chest pain or discomfort","Difficulty breathing"],a:2,e:"Persistent chest pain/pressure/discomfort is the hallmark sign of a heart attack (myocardial infarction)."},
  {s:'A',c:'Past Exam Questions',q:"When performing two-responder CPR, how often should you switch which responder is performing compressions?",o:["After every 2 minutes (5 cycles) of continuous CPR","After every 4 minutes (10 cycles) of continuous CPR","After every 30 compressions","Whenever the responder performing compressions becomes fatigued"],a:0,e:"Rescuers switch every 2 minutes (every 5 cycles of 30:2) to maintain compression quality. Fatigued compressions become shallow and ineffective."},
  {s:'A',c:'Past Exam Questions',q:"What does a nasal cannula do?",o:["When combined with a reservoir bag, it administers high-concentration oxygen","It administers oxygen through the nostrils to a breathing patient","It reduces the delivery pressure of oxygen to a safe level","A and B"],a:1,e:"A nasal cannula delivers low-flow oxygen (1-6 LPM) through two small prongs in the nostrils. It is only for patients who are breathing."},
  {s:'A',c:'Past Exam Questions',q:"When using a nasal cannula, what should the flow rate be?",o:["1 to 4 lpm","6 to 10 lpm","10 to 15 lpm","15 to 25 lpm"],a:0,e:"Nasal cannula delivers oxygen at 1–4 litres per minute. Higher flow rates require a mask. Non-rebreather mask = 10-15 LPM."},
  {s:'A',c:'Past Exam Questions',q:"What is the definition of hyperglycemia?",o:["A condition in which there is too much insulin in the body","A condition in which there is not enough insulin in the body","A condition in which a patient's blood glucose level (BGL) is too high","A condition in which a patient's blood glucose level (BGL) is too low"],a:2,e:"Hyperglycemia = HIGH blood sugar. Hypoglycemia = LOW blood sugar. Memory trick: HyPo = low, HyPer = high."},
  {s:'A',c:'Past Exam Questions',q:"The heart, blood, and blood vessels are major components of which body system?",o:["Integumentary","Circulatory","Respiratory","Nervous"],a:1,e:"The circulatory system consists of the heart, blood, and blood vessels. Its job is to transport oxygen, nutrients, and waste throughout the body."},
  {s:'A',c:'Past Exam Questions',q:"What should you do when responding to a possible crime scene?",o:["Document anything that you interact with or move","Gather and document any potential evidence you encounter","Confirm that the scene is a crime scene before requesting law enforcement personnel","Prevent law enforcement personnel from entering the scene until you have completed your primary assessment"],a:0,e:"At a crime scene your job is patient care, but you must document anything you touch or move so police can accurately reconstruct the scene."},
  {s:'A',c:'Past Exam Questions',q:"In which situation would you remove an impaled object from a wound?",o:["When direct pressure around an object in the forearm fails to stop the bleeding","When the object is impaled in the lower leg, making it impossible to apply a rigid splint to a fractured tibia","When an object impaled in a patient's cheek obstructs breathing","All of the above"],a:2,e:"NEVER remove an impaled object EXCEPT when it is in the cheek and obstructing the airway. In all other cases, stabilize the object in place and transport."},
  {s:'A',c:'Past Exam Questions',q:"You arrive at a scene of someone who inhaled a poison. The patient appears fully alert. Advanced medical care has already been summoned. What is your next priority management step?",o:["Administer 100% oxygen and have the patient rest in a position of comfort","Treat the patient for shock and perform vital signs","Shower the patient with copious amounts of water","Have the patient move to a safe area with fresh air"],a:3,e:"For inhaled poisons, the immediate priority is removing the patient from the toxic environment — get them to fresh air."},
  {s:'A',c:'Past Exam Questions',q:"What does personal protective equipment (PPE) include?",o:["Soap or alcohol-based hand sanitizers","Containers for sharps","Disposable gloves, eye protection, and masks","Disinfectants such as bleach"],a:2,e:"PPE refers to physical barriers worn on the body: gloves, eye protection, and masks. Hand sanitizers and disinfectants are infection control tools but not PPE."},
  {s:'A',c:'Past Exam Questions',q:"What purpose(s) do bandages serve?",o:["To provide a sterile covering for wounds and control bleeding","To apply pressure to control bleeding and hold dressings in place","To reduce pain in open wounds and provide support to injured body parts","To stop air from reaching a wound"],a:1,e:"Bandages hold dressings in place and apply pressure. Dressings (not bandages) provide the sterile covering. Bandages are NOT inherently sterile."},
  {s:'A',c:'Past Exam Questions',q:"What is the name for a hollow place in the body that contains organs?",o:["Stomach","Bone","Body cavity","Quadrant"],a:2,e:"Body cavities are hollow spaces that contain and protect organs. Examples: cranial cavity (brain), thoracic cavity (heart/lungs), abdominal cavity (digestive organs)."},
  {s:'A',c:'Past Exam Questions',q:"After dressing and bandaging a forearm wound, the patient's fingers turn blue. What should you do?",o:["Remove the bandage and apply a new one","Loosen the dressing","Loosen the bandage","Reposition the arm"],a:2,e:"Blue fingers = circulation cut off by the bandage being too tight. Loosen the BANDAGE (outer layer). The dressing (inner layer) stays in place."},
  {s:'A',c:'Past Exam Questions',q:"What category does hemorrhagic shock fall into?",o:["Cardiogenic shock","Hypovolemic shock","Obstructive shock","Psychogenic shock"],a:1,e:"Hemorrhagic shock is caused by blood loss (hypovolemia = low fluid volume). Hypovolemic shock includes hemorrhagic shock and dehydration shock."},
  {s:'A',c:'Past Exam Questions',q:"Emergency response depends on a reliable and efficient communication system. Which of the following is true about a communication system?",o:["A backup communication system should be in place","Communications equipment should be checked often to ensure that it is working","It allows you to contact specialized or more advanced personnel as necessary","All of the above"],a:3,e:"All three statements are true about reliable emergency communication systems. Backup systems, regular checks, and access to advanced personnel are all essential features."},
  {s:'A',c:'Past Exam Questions',q:"What are the anatomical terms for anything located toward the front and back of the body?",o:["Anterior, posterior","Lateral, medial","Proximal, distal","Inferior, superior"],a:0,e:"Anterior = front of the body. Posterior = back of the body. These are directional terms assuming standard anatomical position."},
  {s:'A',c:'Past Exam Questions',q:"What should you do immediately after cooling a thermal burn?",o:["Remove any clothing that is sticking to the skin","Apply a commercial burn ointment, if available","Cover the burn with a sterile non-stick dressing, and bandage loosely","Place an occlusive dressing over the burn, and apply a bandage"],a:2,e:"After cooling: cover with a sterile NON-STICK dressing and bandage loosely. Never remove clothing stuck to burns, never apply ointments, and never use occlusive dressings on burns."},
  {s:'A',c:'Past Exam Questions',q:"Upon arriving at the scene of an assault, you find the patient on the ground while the assailant is still nearby holding a knife. What should you do?",o:["Attempt to convince the assailant to let you care for the patient","Identify yourself and move slowly toward the patient, explaining what you want to do","Call for assistance from appropriate law enforcement personnel and stay back","Have a bystander call the police while you try to convince the assailant to drop the knife"],a:2,e:"Scene safety FIRST. An armed assailant makes the scene unsafe. Do NOT approach. Call law enforcement and stage at a safe distance."},
  {s:'A',c:'Past Exam Questions',q:"When can you stop care of a patient once care has begun?",o:["When a responder with higher or equal training relieves you","When a family member tells you the patient is dead","When you are called to a more serious situation","When you are unsure of what to do"],a:0,e:"You can only stop care when properly handing off to someone with EQUAL OR GREATER training. A family member's word, a more serious call, or uncertainty are NOT valid reasons to stop."},
  {s:'A',c:'Past Exam Questions',q:"A young man has fallen from scaffolding at a construction site. What is your first responsibility in caring for this patient?",o:["Monitoring vital signs","Performing head-tilt/chin-lift","Minimizing movement of the head and spine","Controlling the bleeding from his forehead"],a:2,e:"A fall from scaffolding is a high-mechanism injury with significant risk of spinal injury. Manual spinal motion restriction (SMR) is your first hands-on priority."},
  {s:'A',c:'Past Exam Questions',q:"How should you assess an ill or injured child?",o:["Gain trust through your actions","Observe the child before touching him or her","Talk slowly and remain calm","All of the above"],a:3,e:"Assessing children requires all three approaches: build trust, observe before touching, and stay calm. Children are highly sensitive to the responder's demeanor."},
  {s:'A',c:'Past Exam Questions',q:"Eye contact, touching, posture, and gestures are examples of which of the following?",o:["Physical assault","Active listening","Verbal communication","Non-verbal communication"],a:3,e:"Non-verbal communication includes all body language: eye contact, touch, posture, gestures, and facial expressions."},
  {s:'A',c:'Past Exam Questions',q:"During assisted ventilations, which of the following would cause air to go into a patient's stomach?",o:["Ventilating only until the chest rises","Making an inadequate seal","Failing to use supplemental oxygen","Ventilating too forcefully"],a:3,e:"Ventilating too forcefully causes air to bypass the lungs and enter the stomach (gastric inflation), risking regurgitation and aspiration. Ventilate slowly and only until the chest rises."},
  {s:'A',c:'Past Exam Questions',q:"What should you check while assessing a patient who has had a suspected cerebrovascular accident (CVA)?",o:["Reaction time and speech patterns","Mechanism of injury (MOI) and onset time of signs and symptoms","Anxiety level and blood pressure","Facial droop, arm weakness, and speech abnormalities"],a:3,e:"These are the classic signs of a stroke assessed using the FAST tool: Face (droop), Arms (weakness), Speech (abnormality), Time (call 911). CVA = stroke."},
  {s:'A',c:'Past Exam Questions',q:"What must you do when deploying a piece of commercial equipment?",o:["Follow the manufacturer's instructions","Use it for its intended purpose","Have proficiency in using the equipment","All of the above"],a:3,e:"When using any commercial medical equipment you must: follow manufacturer instructions, use it for its intended purpose, and be proficient in its use. All three are required."},
  {s:'A',c:'Past Exam Questions',q:"You are responding to the scene of a potential sexual assault. Which of the following guidelines should you follow?",o:["Remove articles of clothing only if absolutely necessary to provide care for injuries","Have the patient interact with a responder of the same gender if possible","Treat the area as a crime scene","All of the above"],a:3,e:"All three apply to sexual assault scenes: minimize clothing removal, same-gender responder if possible, and treat as a crime scene to preserve evidence."},
  {s:'A',c:'Past Exam Questions',q:"Which of the following breathing devices would you use in caring for a patient who is breathing only 4 times per minute?",o:["Nasal cannula","Non-rebreather mask","Bag-valve-mask resuscitator (BVM)","Standard oxygen mask"],a:2,e:"4 breaths per minute is severely inadequate (normal is 12-20). This patient needs assisted ventilation — a BVM delivers positive pressure ventilations to support or replace breathing."},
  {s:'A',c:'Past Exam Questions',q:"Which of the following is the most important reason for assessing the scene before approaching a patient?",o:["You might become injured yourself if the scene is not safe","More advanced medical personnel will want to know the scene details","You have to know everything that happened in order to give care","Another responder might already be on scene helping the ill or injured patient"],a:0,e:"Scene assessment is primarily about YOUR SAFETY. An injured responder becomes a second patient and cannot help anyone. Safety always comes first."},
  {s:'A',c:'Past Exam Questions',q:"Which of the following mechanisms of injury (MOI) may indicate a head and/or spinal injury?",o:["Any penetrating injury to the head, neck, or trunk","Any snowmobile incident where the patient is ejected from the vehicle","Any fall from a height greater than approximately one metre (three feet)","All of the above"],a:3,e:"All three are significant MOIs for head/spinal injury. Any penetrating trauma, ejection from vehicles, and falls from height all indicate potential spinal involvement."},
  {s:'A',c:'Past Exam Questions',q:"What is the purpose of the primary assessment?",o:["To ensure there are no dangers at the scene","To determine the number of patients","To find all life-threatening injuries or conditions","To expose and treat all injuries"],a:2,e:"The primary assessment focuses on finding and addressing life threats: airway, breathing, circulation, and level of responsiveness. Scene safety and patient count happen during scene size-up, BEFORE the primary assessment."},
  {s:'A',c:'Past Exam Questions',q:"Which of the following indicates that birth is imminent?",o:["The time between contractions is approximately 5 minutes","The baby's head is visible","The patient's amniotic sac has ruptured","The patient has been having contractions for more than 12 hours"],a:1,e:"Crowning (baby's head is visible at the vaginal opening) indicates birth is imminent. The other options indicate labour is progressing but not necessarily that birth is seconds away."},

  // ===== SECTION B — ORIGINAL 30 =====
  {s:'B',c:'Legal & Ethical',q:"A patient is unconscious following a car accident. They cannot give permission for treatment. What type of consent allows you to treat them?",o:["Expressed consent","Written consent","Implied consent","Informed consent"],a:2,e:"When a patient is unconscious and cannot give expressed consent, implied consent assumes a reasonable person would want life-saving care. You may treat them."},
  {s:'B',c:'Legal & Ethical',q:"Which of the following best describes 'abandonment'?",o:["Refusing to respond to an emergency call","Stopping care without ensuring someone of equal or greater training continues","Failing to document patient care","Providing care without proper consent"],a:1,e:"Once you start care, you are legally obligated to continue until a proper handoff. Abandonment is stopping without that handoff."},
  {s:'B',c:'Legal & Ethical',q:"A patient refuses your care after you explain the risks of refusing. You should:",o:["Treat them anyway since their life may be at risk","Call police to force them to accept treatment","Respect their decision, document the refusal, and try to get them to sign a refusal form","Leave without documenting anything"],a:2,e:"Competent adults have the legal right to refuse care. Your job is to inform them of risks, document everything, and request they sign a refusal form."},
  {s:'B',c:'Triage',q:"What is the START triage system used for?",o:["Assessing vital signs in a single critical patient","Quickly categorizing multiple patients by severity in a mass casualty incident","Determining whether a patient needs surgery","Estimating blood loss from a wound"],a:1,e:"START = Simple Triage And Rapid Treatment. Used in MCIs to sort patients into: Minor (Green), Delayed (Yellow), Immediate (Red), Dead (Black)."},
  {s:'B',c:'Triage',q:"In the START system, a patient with a respiratory rate of 8 breaths per minute should be tagged:",o:["Green (Minor)","Yellow (Delayed)","Red (Immediate)","Black (Dead/Non-salvageable)"],a:2,e:"Normal respiratory rate is 12-20. Under 10 is critically low. In START, breathing present + respiratory rate below 10 = Red (Immediate). Over 30 also = Red."},
  {s:'B',c:'Triage',q:"Which of the following is the correct sequence for the START triage assessment?",o:["Breathing → Circulation → Level of responsiveness","Level of responsiveness → Circulation → Breathing","Circulation → Breathing → Level of responsiveness","Breathing → Level of responsiveness → Circulation"],a:0,e:"START follows: (1) Respiration/Breathing, (2) Circulation/Radial pulse, (3) Level of Responsiveness (LOR). This order is critical."},
  {s:'B',c:'CBRNE',q:"What does CBRNE stand for?",o:["Chemical, Biological, Radiological, Nuclear, Explosive","Chemical, Bacterial, Radiological, Nuclear, Environmental","Combustion, Biological, Radiation, Neurological, Explosive","Chemical, Biological, Radiation, Nerve agent, Explosive"],a:0,e:"CBRNE defines the categories of weapons/incidents that require specialized response teams and PPE."},
  {s:'B',c:'Scene Safety',q:"What is the minimum safe distance from a downed electrical wire?",o:["5 metres (15 feet)","10 metres (30 feet)","15 metres (50 feet)","30 metres (100 feet)"],a:2,e:"You must stay at least 15 metres (50 feet) from a downed wire. Electrical current can arc through the ground outward from the wire."},
  {s:'B',c:'Pregnancy & Delivery',q:"Abruptio placentae refers to:",o:["The placenta covering the cervix","The early separation of the placenta from the uterine wall","A baby being born feet first","The umbilical cord exiting before the baby"],a:1,e:"Abruptio placentae = placenta detaches from the uterus BEFORE delivery. This causes serious bleeding and is life-threatening to both mother and baby."},
  {s:'B',c:'Circulatory Emergencies',q:"Which of the following is NOT a shockable cardiac rhythm?",o:["Ventricular fibrillation (VF)","Ventricular tachycardia (VT)","Pulseless electrical activity (PEA)","Coarse VF"],a:2,e:"PEA and Asystole are non-shockable. VF and pulseless VT are shockable because a defibrillation shock can reset them."},
  {s:'B',c:'Acute & Chronic Illness',q:"Hyperglycemia in a diabetic patient may present with:",o:["Sudden onset, cool/clammy skin, and shakiness","Gradual onset, increased thirst, frequent urination, and fruity breath","Sudden onset, seizures, and unconsciousness","Profuse sweating and rapid heart rate"],a:1,e:"Hyperglycemia comes on gradually: 3 Ps — Polyuria, Polydipsia, Polyphagia. Fruity breath from ketones is a classic sign. Hypoglycemia = sudden, cold/clammy, shaky."},
  {s:'B',c:'Airway Management',q:"Which of the following is true about the non-rebreather mask?",o:["It delivers 30-40% oxygen","It is used to assist ventilation in non-breathing patients","It delivers up to 90% oxygen to a breathing patient","It requires a flow rate of 1-4 LPM"],a:2,e:"The non-rebreather mask delivers 60-90%+ oxygen at 10-15 LPM. It is for BREATHING patients only — not for ventilation."},
  {s:'B',c:'Assessment',q:"What is the GCS (Glasgow Coma Scale) maximum and minimum score?",o:["Max 15, Min 0","Max 15, Min 3","Max 12, Min 3","Max 15, Min 1"],a:1,e:"GCS: Eyes (1-4) + Verbal (1-5) + Motor (1-6) = 3 to 15. A score of 3 means no response in any category. A score of 15 is fully alert and oriented."},
  {s:'B',c:'Chest Injuries',q:"Which of the following is the correct way to manage a sucking chest wound?",o:["Pack the wound with sterile gauze","Apply an occlusive dressing sealed on all four sides","Apply an occlusive dressing sealed on three sides","Leave the wound open to allow air to escape"],a:2,e:"A three-sided occlusive seal allows air to escape during exhalation (preventing tension pneumothorax) but seals during inhalation."},
  {s:'B',c:'Assessment',q:"What is the purpose of the secondary assessment?",o:["To identify and address life-threatening conditions","To perform a detailed head-to-toe examination after life threats are controlled","To determine scene safety","To establish a diagnosis"],a:1,e:"The secondary assessment is a systematic head-to-toe exam done AFTER the primary assessment. It finds non-life-threatening injuries and gathers a SAMPLE history."},
  {s:'B',c:'Acute & Chronic Illness',q:"A patient has a blood glucose level (BGL) of 2.0 mmol/L. This indicates:",o:["Normal blood glucose","Hyperglycemia","Hypoglycemia","Diabetic ketoacidosis"],a:2,e:"Normal BGL is approximately 4-8 mmol/L. A level of 2.0 is critically low (hypoglycemia). If conscious, give sugar. If unconscious, do NOT give anything by mouth."},
  {s:'B',c:'Airway Management',q:"Which of the following is correct about epiglottitis versus croup?",o:["Both are caused by viral infections","Croup causes drooling; epiglottitis does not","Epiglottitis is bacterial and can cause life-threatening airway obstruction; croup is viral","Cool moist air helps both conditions"],a:2,e:"Croup = viral, barking cough, cool air helps, less dangerous. Epiglottitis = bacterial, drooling, tripod position, life-threatening, rapid transport required."},
  {s:'B',c:'Special Populations',q:"What does palliative care focus on?",o:["Curing the underlying disease","Prolonging life as long as possible","Improving quality of life and managing symptoms/comfort","Transferring the patient to hospital"],a:2,e:"Palliative care is for patients with terminal illness. The goal is NOT to cure or prolong life, but to maximize comfort, dignity, and quality of life."},
  {s:'B',c:'Crisis Intervention',q:"You suspect a child has been abused. You are legally required to:",o:["Confirm the abuse before reporting","Ask the caregiver if they want you to report it","Report the suspected abuse to child protection services","Wait until a police officer arrives to confirm"],a:2,e:"Mandatory reporting of suspected child abuse is a LEGAL OBLIGATION in all Canadian provinces. Suspicion alone requires reporting."},
  {s:'B',c:'CBRNE',q:"When approaching a CBRNE scene, you should position yourself:",o:["Downhill and downwind","Uphill and upwind","Downhill and upwind","Uphill and downwind"],a:1,e:"Uphill prevents liquid chemical runoff. Upwind prevents inhalation of vapours or gases. Both directions together give maximum protection."},
  {s:'B',c:'Medications',q:"Which of the following is correct regarding the Six Rights of Medication?",o:["Right person, right medication, right dosage, right time, right route, right documentation","Right person, right medication, right strength, right time, right route, right notes","Right patient, right drug, right dose, right time, right method, right outcome","Right person, right medication, right dose, right date, right route, right documentation"],a:0,e:"The exact Six Rights: Person · Medication · Dosage · Time · Route · Documentation. Note 'Time' not 'date', and 'Dosage' not 'strength'."},
  {s:'B',c:'Triage',q:"What is the primary purpose of triage?",o:["To provide treatment to the most critical patients first","To sort patients by severity so the most patients survive with available resources","To identify the cause of the incident","To transport patients as quickly as possible"],a:1,e:"Triage is about doing the GREATEST GOOD for the GREATEST NUMBER — sometimes bypassing patients who are beyond help to save those who can be saved."},
  {s:'B',c:'Triage',q:"A patient with no radial pulse but present breathing in the START system should be tagged:",o:["Green","Yellow","Red","Black"],a:2,e:"No radial pulse = circulation compromised = Red tag. START decision tree: breathing present → check radial pulse → absent pulse = Red."},
  {s:'B',c:'Assessment',q:"What is the recovery position used for?",o:["Patients in cardiac arrest","Conscious patients with suspected spinal injuries","Unconscious patients who are breathing to maintain an open airway","Patients experiencing a seizure"],a:2,e:"The recovery position (lateral recumbent) keeps an unconscious but breathing patient's airway open and allows fluids to drain, preventing aspiration."},
  {s:'B',c:'Assessment',q:"What does SAMPLE stand for?",o:["Signs, Allergies, Medications, Past history, Last intake, Events","Symptoms, Activity, Medications, Pain, Last meal, Environment","Signs, Assessment, Medical history, Problems, Last oral intake, Events","Symptoms, Allergies, Medications, Physical exam, Location, Events"],a:0,e:"SAMPLE: S-Signs/symptoms, A-Allergies, M-Medications, P-Past medical history, L-Last oral intake, E-Events leading to the incident."},
  {s:'B',c:'Triage',q:"Which of the following is NOT checked in the START triage process?",o:["Respiration","Radial pulse","Blood pressure","Level of responsiveness"],a:2,e:"START checks three things only: (1) Respiration, (2) Radial Pulse/Circulation, (3) Level of Responsiveness. Blood pressure is NOT checked during triage."},
  {s:'B',c:'Chest Injuries',q:"Which of the following is a sign of tension pneumothorax?",o:["Trachea shifting toward the injured side","Trachea shifting away from the injured side","Bilaterally equal breath sounds","Bradycardia"],a:1,e:"Tension pneumothorax causes air to build up on one side, pushing the trachea and mediastinum to the OPPOSITE side. This is a life-threatening emergency."},
  {s:'B',c:'CPR',q:"Two-rescuer CPR for an adult uses which ratio?",o:["15:1","15:2","30:1","30:2"],a:3,e:"Two-rescuer adult CPR = 30:2, same as single-rescuer adult. ONLY two-rescuer child CPR changes to 15:2."},
  {s:'B',c:'CPR',q:"What is the most important reason to switch compression providers every 2 minutes during CPR?",o:["To allow the other responder to rest","To prevent compression fatigue affecting depth and rate","Because the AED needs to analyze every 2 minutes","To check for a pulse every 2 minutes"],a:1,e:"Quality compressions require adequate depth (5-6 cm) and rate (100-120/min). Fatigue causes compressions to become too shallow — switching every 2 minutes maintains quality."},
  {s:'B',c:'CPR',q:"Which of the following patients should be moved BEFORE receiving care?",o:["A patient in cardiac arrest lying on a soft bed","An unconscious patient lying on a flat sidewalk","A patient with a suspected broken arm sitting in a chair","A patient with chest pain lying on a couch"],a:0,e:"Effective CPR requires a hard, flat surface. A soft bed absorbs compression force. Move the patient to the floor BEFORE starting CPR."},

  // ===== SECTION B — NEW QUESTIONS FROM CHAPTER WORKSHEETS =====
  // Infection Prevention & Control
  {s:'B',c:'Infection Prevention & Control',q:"Which of the following can be transmitted by airborne particles?",o:["HIV/AIDS","Hepatitis and chicken pox","Meningitis and tuberculosis","Herpes and tetanus"],a:2,e:"Meningitis and tuberculosis are the classic airborne-transmitted diseases. HIV/AIDS spreads through blood/bodily fluids; herpes spreads via direct contact."},
  {s:'B',c:'Infection Prevention & Control',q:"In which of the following cases should you wear full protective equipment (gloves, gown, mask, and eyewear)?",o:["When wiping down a blood pressure cuff after a call","When caring for bleeding that is spurting","When caring for someone with signs of an infectious respiratory illness","Both b and c"],a:3,e:"Full PPE is required when there is risk of blood spurting OR signs of infectious respiratory illness. Both situations warrant full protection."},
  {s:'B',c:'Infection Prevention & Control',q:"Which of the following can be transmitted by contaminated food?",o:["Tuberculosis and rubella","Typhus and diphtheria","Meningitis and hepatitis A","HIV/AIDS and herpes"],a:2,e:"Hepatitis A is a classic food-borne illness. Meningitis can also be transmitted through contaminated food/water. TB is airborne; HIV spreads through blood/fluids."},
  {s:'B',c:'Infection Prevention & Control',q:"If you think you have been exposed to an infectious disease at an emergency scene, the first step you should take is:",o:["Go to a hospital to be tested","Report the exposure immediately","Determine what type of disease it is","Contact the Poison Control Centre"],a:1,e:"Reporting the exposure immediately is the first critical step — it triggers the exposure protocol and enables proper follow-up care."},
  {s:'B',c:'Infection Prevention & Control',sc:"You are called to an office because a young intern is worried about her boss, who has fallen and cut his leg. You learn that her boss has been coughing more than usual, and at times there has been blood on the tissues he uses.",q:"What personal protective equipment, if any, should you wear when caring for the patient?",o:["Gloves","Gloves and eye protection","Surgical mask and gloves","Gloves, eye protection, N95 mask"],a:3,e:"Blood on tissues and persistent cough suggests a possible serious respiratory illness (like TB). Full protection including an N95 mask, gloves, and eye protection is warranted."},
  {s:'B',c:'Infection Prevention & Control',sc:"The intern may have been exposed through particles expelled during coughing.",q:"If the patient's intern became infected through particles expelled during coughing, what method of disease transmission would this be?",o:["Direct contact","Indirect contact","Vector-borne transmission","Airborne transmission"],a:3,e:"Particles expelled during coughing that travel through the air and are inhaled by another person = airborne transmission. This is why an N95 mask is essential."},

  // Anatomy & Physiology
  {s:'B',c:'Anatomy & Physiology',q:"Where do arteries carry blood?",o:["From the heart to the body tissues","From the lungs to the heart","From the heart to the lungs","Both a and c"],a:3,e:"Arteries carry blood AWAY from the heart. Systemic arteries carry oxygenated blood to body tissues; pulmonary arteries carry deoxygenated blood from heart to lungs. Both a and c are correct."},
  {s:'B',c:'Anatomy & Physiology',q:"One of the main functions of the integumentary system is to:",o:["Prevent infection","Secrete hormones","Produce white blood cells","Transport nutrients to cells"],a:0,e:"The integumentary system (skin, hair, nails) acts as the body's first physical barrier against infection and pathogens. It also regulates temperature and prevents fluid loss."},
  {s:'B',c:'Anatomy & Physiology',q:"In comparison with the chest, the neck is described as ___, whereas the abdomen is described as ___.",o:["Medial, lateral","Superior, inferior","Proximal, distal","Anterior, posterior"],a:1,e:"The neck is superior to (above) the chest. The abdomen is inferior to (below) the chest. Superior and inferior are vertical directional terms."},
  {s:'B',c:'Anatomy & Physiology',q:"The respiratory system and cardiovascular system work together to:",o:["Provide oxygen to the cells of the body","Keep hormones distributed throughout the body","Regenerate nervous tissue after injury","Regulate blood flow to the digestive system"],a:0,e:"These two systems work in tandem: the respiratory system brings oxygen in and expels CO2, while the cardiovascular system transports oxygenated blood to all cells."},
  {s:'B',c:'Anatomy & Physiology',sc:"While at work at a machine shop, a man is turning a piece of steel on a lathe. The steel projects toward the man and makes a deep laceration in the back of his upper arm.",q:"Which two body systems will interact to alert the man to his injury?",o:["Nervous and respiratory","Endocrine and nervous","Nervous and integumentary","Circulatory and digestive"],a:2,e:"The nervous system detects pain (nerve endings). The integumentary system (skin) is the site of injury. These two systems interact first to alert the person to the laceration."},

  // Assessment
  {s:'B',c:'Assessment',q:"Which of the following should you treat before performing a secondary assessment?",o:["A fracture of the elbow","An impaled object in the right hand","Severe bleeding from the left leg","None of these injuries should be treated until after the secondary assessment"],a:2,e:"Severe bleeding is a life-threatening condition that must be controlled immediately during the primary assessment — BEFORE the secondary assessment."},
  {s:'B',c:'Assessment',q:"When forming a general impression, which of the following do you NOT need to determine?",o:["Whether the patient is ill or injured","The patient's sex and approximate age","Whether the patient takes any medications","The patient's chief complaint or problem"],a:2,e:"Medications are gathered during the SAMPLE history in the secondary assessment — not during the general impression. The general impression covers: ill vs. injured, sex/age, and chief complaint."},
  {s:'B',c:'Assessment',q:"Which of the following patients should be in the rapid transport category?",o:["A 30-year-old woman who has a bruise on her leg from a soccer ball","A 50-year-old man experiencing numbness and tingling on the right side of his body, and slurred speech","A 10-year-old girl who is crying because of a bee sting","A 65-year-old man experiencing stiffness in his back after swimming 30 lengths of the pool"],a:1,e:"Numbness/tingling on one side of the body with slurred speech are classic signs of a stroke (CVA) — a time-critical emergency requiring immediate transport."},
  {s:'B',c:'Assessment',q:"What are the purposes of the primary and secondary assessments?",o:["Determine whether the patient is in shock; identify whether your treatment has helped","Identify any hazards at the scene; determine what else might be wrong with the patient","Determine initial vital signs; identify allergies or medications the patient might have","Identify conditions that are an immediate threat to life; identify conditions that are not immediately life-threatening"],a:3,e:"Primary assessment = find and manage immediate life threats (ABCs). Secondary assessment = find non-life-threatening conditions through detailed head-to-toe exam."},

  // Special Populations
  {s:'B',c:'Special Populations',sc:"You respond to a call and find a bariatric patient slumped in a chair in his office's break room. He is unable to stand and is complaining of pain in his abdomen.",q:"How should you modify your SAMPLE questions to accommodate this bariatric patient?",o:["You should avoid asking for details about his past medical history","You should ask about his oral intake for at least the last 24 hours","You should ask whether he knows his baseline blood pressure","You should ask the same questions you would ask any patient"],a:3,e:"SAMPLE questions remain the same for bariatric patients. Good clinical care means gathering the same thorough history regardless of the patient's size."},
  {s:'B',c:'Special Populations',q:"Which of the following is important to do when caring for someone with a visual impairment?",o:["Stand directly in front of the patient so he or she can see your shadow","Stay very quiet so the patient can hear what else is going on nearby","Speak loudly and enunciate every word so the patient can hear you properly","Explain what you are doing, especially before touching the patient"],a:3,e:"Patients with visual impairment cannot see your actions. Always explain what you are doing before touching them — this reduces anxiety and builds trust."},
  {s:'B',c:'Special Populations',q:"What is your main goal when treating a palliative care patient?",o:["To delay the death of the patient for as long as possible","To encourage the patient to move into a hospital for full-time care","To comfort the patient's family and help them feel they're doing everything possible","To improve quality of life and make the patient as comfortable as possible"],a:3,e:"Palliative care focuses entirely on comfort and quality of life — not on curative or life-prolonging treatment. The patient's dignity and comfort are the primary goals."},
  {s:'B',c:'Special Populations',q:"When caring for a patient who has a service animal, what should you do?",o:["Keep the animal close to the patient, if possible, but avoid interacting with it","Close the animal in another room or have a bystander keep it out of sight","Keep the animal close and reassure the animal by speaking calmly to it","Have a bystander keep the animal within sight of the patient but at least 15 feet away"],a:0,e:"Service animals provide essential support and comfort to their owners. Keep the animal close to the patient but avoid interacting with it — service animals are working and should not be distracted."},

  // Crisis Intervention
  {s:'B',c:'Crisis Intervention',q:"When dealing with a scene involving a physical assault, what is your first concern?",o:["The patient's physical injuries","The emotional state of the patient and any bystanders","Documenting everything you see for police reports","Your own safety"],a:3,e:"Scene safety ALWAYS comes first — even before patient care. An assault scene may still have an active threat. Your own safety is your first concern."},
  {s:'B',c:'Crisis Intervention',q:"If you suspect that a child has been the victim of assault, which of the following are you legally required to do?",o:["Look for clues to determine whether the child's version of events is true","Ask the child's caregiver(s) whether they would like you to report the crime to police","Prevent anyone else from speaking to the child until a law enforcement officer is present","Report the crime to your provincial or territorial child protection service"],a:3,e:"Mandatory reporting to child protection services is a legal obligation in all Canadian provinces and territories. Suspicion alone is sufficient — you do not need to confirm the abuse."},
  {s:'B',c:'Crisis Intervention',q:"If a patient makes statements about considering suicide, what should you do?",o:["Distract the patient by asking about topics of general interest","Attempt to convince the patient that life is worth living","Document the statements and report them when care is transferred","Place the patient in the rapid transport category"],a:2,e:"Document suicidal statements and report them at handoff. Listen actively and stay with the patient — documenting and reporting is your key legal and clinical obligation."},
  {s:'B',c:'Crisis Intervention',q:"If a patient seems to be experiencing a psychotic episode and you believe there is a risk of violence, how should you ensure your own safety?",o:["Ask any bystanders to help you restrain the patient","Remain at a safe distance and request law enforcement personnel","Leave the scene","Tell the patient that you will not provide care until he or she calms down"],a:1,e:"A violent or potentially violent patient requires law enforcement support. Remain at a safe distance and call for police — do NOT attempt to restrain the patient."},

  // Airway Management
  {s:'B',c:'Airway Management',sc:"You are called to a break room where a pregnant woman is choking. Advanced care is on the way. She is visibly pregnant and making high-pitched wheezing sounds.",q:"After identifying yourself and explaining what you are going to do, you should:",o:["Have the patient lie on the ground and begin chest compressions","Stand behind the patient and begin abdominal thrusts","Do nothing until the patient stops making sounds","Stand behind the patient and alternate between five firm back blows and five chest thrusts"],a:3,e:"For a conscious choking pregnant patient, you perform back blows and chest thrusts (NOT abdominal thrusts, which could harm the fetus). Alternate 5 back blows and 5 chest thrusts."},
  {s:'B',c:'Airway Management',sc:"The pregnant choking woman becomes unresponsive. You lower her to the ground and open her airway. She is not breathing but has a pulse.",q:"You find she is not breathing but has a pulse. You should:",o:["Attempt to give her a ventilation","Check for bystanders who can answer SAMPLE questions","Begin chest compressions","Do a finger sweep of her mouth"],a:0,e:"If a patient has a pulse but is not breathing, give ventilations only — do NOT start chest compressions. Attempt to give a ventilation as the first step."},
  {s:'B',c:'Airway Management',sc:"You are giving ventilations and a ventilation goes in with the chest just beginning to rise.",q:"At one point, your ventilation goes in and you see the patient's chest just begin to rise. You should:",o:["Do 30 chest compressions","Give another ventilation","Roll the patient into the recovery position","Recheck the patient's ABCs"],a:1,e:"When a ventilation enters and the chest rises, that is a successful ventilation. Continue giving ventilations at the 1 breath per 5-6 seconds rhythm for a patient with a pulse."},
  {s:'B',c:'Airway Management',q:"Which body systems can be affected by anaphylaxis?",o:["Nervous, endocrine, and genitourinary","Integumentary, endocrine, musculoskeletal, and nervous","Digestive, respiratory, and genitourinary","Integumentary, respiratory, cardiovascular, and digestive"],a:3,e:"Anaphylaxis is a systemic reaction affecting the skin (integumentary), airway and lungs (respiratory), heart and blood vessels (cardiovascular), and gastrointestinal tract (digestive)."},
  {s:'B',c:'Airway Management',q:"What signs may be present that indicate anaphylaxis is affecting the digestive system?",o:["Abdominal pain","Nausea","Vomiting","All of the above"],a:3,e:"Anaphylaxis can cause abdominal pain, nausea, and vomiting as the digestive system is affected. All three are recognized signs of a systemic allergic reaction."},
  {s:'B',c:'Airway Management',q:"A person who has experienced anaphylactic reactions in the past will often carry:",o:["A glucometer","An epinephrine auto-injector","A pulse oximeter","A metered-dose inhaler"],a:1,e:"Epinephrine auto-injectors (like an EpiPen) are the standard self-treatment for anaphylaxis. Patients with known severe allergies are prescribed and trained to carry these."},
  {s:'B',c:'Airway Management',q:"General care for any respiratory distress can include:",o:["Assisting the patient with taking prescribed medication and reassuring the patient","Performing CPR","Having the patient lie down, keeping the patient cool","Ensuring the area is well-ventilated, performing abdominal thrusts"],a:0,e:"General care for respiratory distress includes: reassurance, positioning of comfort (usually sitting up), assisting with prescribed medications (like inhalers), and calling for advanced care."},
  {s:'B',c:'Airway Management',q:"A patient has no signs of breathing or circulation. After giving two one-second ventilations, what should you do?",o:["Check for signs of circulation for no more than 5 to 10 seconds","Check the patient's level of responsiveness","Continue providing assisted ventilation","Begin 30 chest compressions"],a:3,e:"If a patient has no signs of breathing or circulation after 2 ventilations, begin CPR immediately — starting with 30 chest compressions."},
  {s:'B',c:'Airway Management',sc:"You are starting care for someone who is unresponsive and choking.",q:"If your first ventilation does not go in, you should:",o:["Do 30 chest compressions","Attempt another ventilation with slightly more force","Do a finger sweep of the mouth","Reposition the patient's head and attempt another ventilation"],a:3,e:"If a ventilation does not go in, reposition the head (re-tilt/chin-lift) and attempt another ventilation. Proper head positioning is the most common fix for a failed ventilation."},
  {s:'B',c:'Airway Management',q:"When performing back blows and chest thrusts on a responsive choking infant, how should you position the patient?",o:["On a flat surface such as a table","On a soft surface such as a folded blanket","On your thigh with the head lower than the chest","Upside down so gravity has the most effect"],a:2,e:"For a choking infant, hold the baby face-down on your thigh with the head lower than the chest. This uses gravity to help dislodge the obstruction while you perform back blows."},
  {s:'B',c:'Airway Management',q:"How long will a D cylinder of oxygen last, given a gauge pressure of 2000 and a flow rate of 12 LPM?",o:["12.6 minutes","16 minutes","20.4 minutes","24 minutes"],a:1,e:"Using the formula: Duration = (Pressure × Cylinder constant) ÷ Flow rate. For a D cylinder (constant ≈ 0.16): (2000 × 0.16) ÷ 12 = 320 ÷ 20 ≈ 16 minutes."},

  // Circulatory Emergencies
  {s:'B',c:'Circulatory Emergencies',sc:"A man with chest pain radiating to his back and neck has his own nitroglycerin — it is labelled for him and has not expired.",q:"To avoid the risk of lowering the patient's blood pressure, what must you ask before suggesting he take the nitroglycerin?",o:["Have you taken it already, how many times","Do you have hypotension","Do you mind having low blood pressure","Suggest caffeine before nitroglycerin"],a:1,e:"Before administering nitroglycerin, you MUST ask if the patient has hypotension (low blood pressure). Nitroglycerin dilates blood vessels and can dangerously lower BP in a hypotensive patient."},
  {s:'B',c:'Circulatory Emergencies',sc:"Advanced medical care will be on scene in approximately 10 minutes.",q:"Should you suggest a second dose of nitroglycerin?",o:["Yes, if the pain has not been relieved after 3 to 5 minutes","Yes, if the pain is not relieved immediately","Yes, if the pain gets any worse","No: a patient should not take more than one dose of nitroglycerin per day"],a:0,e:"A second dose of nitroglycerin can be given if pain has not been relieved after 3-5 minutes and blood pressure remains adequate. This follows the standard nitroglycerin protocol."},
  {s:'B',c:'Circulatory Emergencies',sc:"Your partner is doing CPR on a 6-year-old boy in cardiac arrest. You arrive with the AED and expose his chest. You see a MedicAlert necklace saying he has a heart problem.",q:"What should you do?",o:["Nothing, as you should not use an AED on a child","Nothing, as you should not use an AED on someone with a pre-determined heart problem","Use the AED on the child","Stop CPR"],a:2,e:"AEDs CAN and SHOULD be used on children in cardiac arrest. A known heart condition is not a contraindication — the AED analyzes the rhythm and shocks only if needed."},
  {s:'B',c:'Circulatory Emergencies',sc:"Upon preparing to put electrode pads on the small child, you notice the two pads are almost touching.",q:"You should:",o:["Use only one electrode pad","Move the lower electrode pad further toward the abdomen to make space","Do not use the AED on the child","Put one electrode pad on the chest and one on the back"],a:3,e:"When electrode pads are too close together on a small child, place one pad on the front of the chest and one on the back. This ensures the electrical current passes effectively through the heart."},
  {s:'B',c:'Circulatory Emergencies',sc:"The AED analyzes, charges, and you deliver a shock.",q:"What is your next step after delivering the shock?",o:["Continue compressions","Check carotid pulse","Check brachial pulse","Check for breathing signs"],a:0,e:"Immediately after delivering a shock, resume chest compressions WITHOUT checking for a pulse first. Continue CPR for 2 minutes before the AED re-analyzes."},
  {s:'B',c:'Circulatory Emergencies',q:"The main purpose of CPR is to:",o:["Reverse the damage the myocardium may have sustained while deprived of oxygenated blood","Keep oxygenated blood circulating to the vital organs of the body","Prevent clinical death from occurring","None of the above"],a:1,e:"CPR does not restart the heart or reverse damage — its purpose is to keep oxygenated blood circulating to vital organs (especially brain and heart) until advanced care can restore normal rhythm."},
  {s:'B',c:'Circulatory Emergencies',q:"The surest sign of cardiac arrest is:",o:["Unresponsiveness","Absence of a pulse","Ineffective or absent breathing","Blueness around the lips"],a:1,e:"The surest sign of cardiac arrest is the absence of a pulse (no circulation). While unresponsiveness and absent breathing are also signs, the pulse check confirms cardiac arrest."},
  {s:'B',c:'Circulatory Emergencies',q:"Children's and babies' hearts usually stop because:",o:["Their hearts are not fully developed yet","There are a large number of diseases that often affect their hearts","Their brains are not yet fully programmed to regulate the heart's electrical system","Their breathing stops"],a:3,e:"In children and infants, cardiac arrest is almost always secondary to respiratory failure — breathing stops first, which then causes the heart to stop. This is why airway management is critical in pediatric emergencies."},
  {s:'B',c:'Circulatory Emergencies',q:"When is it appropriate to stop CPR?",o:["When you get tired","Never","When asked by a family member","When replaced by another responder or when told to by a physician"],a:3,e:"CPR can be stopped when: a responder of equal or greater training takes over, or a physician orders it stopped. A family member's request alone is NOT sufficient to stop CPR."},

  // Pregnancy, Labour, and Delivery
  {s:'B',c:'Pregnancy & Delivery',sc:"On a snowy January day, you are called to the office of a pregnant woman due on maternity leave in a week. She is having steadily worsening abdominal cramps.",q:"What is your initial impression of the patient's condition?",o:["She is experiencing Braxton Hicks contractions","She is experiencing an ectopic pregnancy","She is going into labour","She is experiencing placenta previa"],a:2,e:"Steadily increasing and strengthening contractions in a term pregnancy are the classic sign of active labour. Braxton Hicks contractions are irregular; ectopic pregnancy would be very preterm."},
  {s:'B',c:'Pregnancy & Delivery',sc:"A few minutes later, a gush of clear fluid soaks her pants.",q:"A gush of clear fluid soaking her pants would indicate:",o:["The amniotic sac has ruptured","The placenta is being expelled","The woman has had a miscarriage","The baby is crowning"],a:0,e:"A gush of clear fluid is the classic sign of membrane rupture (amniotic sac breaking = 'waters breaking'). This indicates labour is progressing and delivery may be imminent."},
  {s:'B',c:'Pregnancy & Delivery',sc:"Contractions are 2 minutes apart and last approximately 70 seconds. Roads are snowy and advanced care may be delayed.",q:"You should:",o:["Transport the woman to the hospital","Have the woman lie down in a position of comfort","Pack the woman's vagina with sterile dressings","Tell the woman to try to delay the birth as much as possible"],a:1,e:"With contractions 2 minutes apart and lasting 70 seconds, birth is likely imminent. Have her lie in a position of comfort and prepare to assist with delivery. Never pack the vagina or attempt to delay birth."},
  {s:'B',c:'Pregnancy & Delivery',sc:"You assess the woman and see that the baby is crowning. After the baby is delivered:",q:"After the baby is delivered, which of the stages of labour has just ended?",o:["First","Second","Third","Fourth"],a:1,e:"The second stage of labour ends with the delivery of the baby (from full dilation to birth). The third stage is delivery of the placenta. The fourth stage is the recovery period after delivery."},
  {s:'B',c:'Pregnancy & Delivery',sc:"The baby begins crying spontaneously and seems to be breathing normally. He has a heart rate of 102 bpm.",q:"What should you do next?",o:["Dry the neonate and help him to maintain a normal body temperature","Begin compression-only CPR","Perform CPR at a ratio of 3:1 for 30 seconds","Provide blow-by supplemental oxygen at a rate of 4 litres per minute"],a:0,e:"A crying, breathing neonate with a heart rate above 100 bpm is doing well. Dry the baby thoroughly and keep him warm — neonates lose body heat rapidly. No CPR is needed."},
  {s:'B',c:'Pregnancy & Delivery',q:"How does slow, deep breathing through the mouth help a woman in labour?",o:["It aids in muscle relaxation","It distracts her","It ensures adequate oxygen for the mother and baby","All of the above"],a:3,e:"Slow, deep breathing during labour helps muscles relax, provides a mental distraction from pain, and ensures the mother and baby receive adequate oxygen during contractions."},
  {s:'B',c:'Pregnancy & Delivery',q:"When you assess a neonate, you find a pulse of 90. You should:",o:["Begin CPR at a rate of 3:1","Begin ventilation using a neonate or pediatric bag-valve-mask (BVM) with room air","Continue with your assessment of the neonate","Treat the neonate for shock"],a:1,e:"A neonatal heart rate below 100 bpm requires intervention. Begin ventilation using a neonatal/pediatric BVM with room air. If the rate drops below 60 bpm despite ventilation, add chest compressions."},
  {s:'B',c:'Pregnancy & Delivery',q:"If you see a loop of umbilical cord coming out of the vaginal opening, this is called:",o:["Prolapsed cord","Breech birth","Placenta previa","Limb presentation"],a:0,e:"A prolapsed cord occurs when the umbilical cord exits through the vaginal opening before the baby. This is life-threatening — the cord can be compressed by the baby, cutting off oxygen supply."},
  {s:'B',c:'Pregnancy & Delivery',q:"During which of the following childbirth complications would you place your fingers in a 'V' position around the baby's mouth and nose?",o:["Prolapsed cord","Breech birth","Placenta previa","Ectopic pregnancy"],a:0,e:"In a prolapsed cord delivery, you place two fingers in a 'V' shape around the baby's nose and mouth to keep the baby's head off the cord, preventing compression and maintaining blood flow."},
  {s:'B',c:'Pregnancy & Delivery',q:"If you see the umbilical cord wrapped around the baby's neck, you should:",o:["Gently move the cord over the head or slip it over the baby's shoulders as they emerge","Pull gently on the baby's shoulders as they emerge to speed up the delivery","Apply firm pressure to the baby's head to slow down the delivery, then unwrap the cord","Increase oxygen flow to the mother"],a:0,e:"If the cord is around the neck (nuchal cord), gently slip it over the baby's head or over the shoulders as they emerge. Do NOT pull on the baby or delay delivery."},
  {s:'B',c:'Pregnancy & Delivery',q:"If a neonate is showing signs of respiratory distress, you should:",o:["Begin chest thrusts and back blows","Flick the soles of the baby's feet with your fingers","Suction the mouth or nose with a bulb syringe","Begin CPR at a rate of 3:1"],a:2,e:"Mild respiratory distress in a neonate is often caused by fluid in the airway. Gently suction the mouth first, then the nose with a bulb syringe to clear the airway."},
  {s:'B',c:'Pregnancy & Delivery',q:"To control vaginal bleeding after the delivery of the baby, you can:",o:["Pack the vagina with sterile dressings and elevate the mother's legs","Massage the abdomen and have the mother assume a semi-sitting position","Massage the abdomen and encourage the mother to nurse the baby","Have the mother assume the recovery position"],a:2,e:"Massaging the uterine fundus (abdomen) helps the uterus contract and reduces bleeding. Encouraging breastfeeding releases oxytocin which also stimulates uterine contractions, further reducing bleeding."},
  {s:'B',c:'Pregnancy & Delivery',q:"Normally, the placenta will come out of the vaginal opening:",o:["Within 20 minutes of the delivery of the baby","Immediately before the baby is delivered","Approximately one hour after the delivery of the baby","During the fourth stage of labour"],a:0,e:"The placenta is normally delivered within 20 minutes of the baby's birth (third stage of labour). If it takes longer than 30 minutes, this is abnormal and requires advanced medical care."},

  // Shock
  {s:'B',c:'Shock',sc:"A pedestrian was hit in the thigh by a vehicle. Her pulse is 130, weak and rapid, and her blood pressure is 86/58.",q:"This most likely indicates:",o:["She is losing blood internally, and her heart is compensating for this by beating faster","She has a severe infection that is affecting her cardiovascular system","She is mad at the driver for hitting her, and her stress level is high","Nothing is wrong, as these vital signs are normal for someone of her age"],a:0,e:"Rapid weak pulse and low blood pressure after traumatic injury indicates compensated shock — the heart beats faster to maintain blood pressure as she loses blood from the thigh injury."},
