  {s:'B',c:'Shock',sc:"The patient's next set of vitals: pulse 150, breathing 30/min, BP 74/42. She does not respond to your voice.",q:"What is the next step to take?",o:["Shake her to wake her up","Increase the flow of oxygen","Apply a painful stimulus and look for a response","Take note of her level of responsiveness and move on to checking her pupils"],a:3,e:"When assessing level of responsiveness, if verbal stimulus gets no response, apply a painful stimulus (AVPU scale). Note the result and move through your systematic assessment."},
  {s:'B',c:'Shock',sc:"The patient begins to gasp for air and then stops breathing. You reassess her ABCs and find she is in cardiac arrest.",q:"What is your next step?",o:["Take her blood pressure","Recheck her vital signs","Suction her airway and then increase oxygen flow","Begin CPR/AED"],a:3,e:"Cardiac arrest = begin CPR/AED immediately. Do not delay to recheck vitals or take blood pressure — every second without CPR reduces survival."},
  {s:'B',c:'Shock',q:"What should you do for a patient who is in shock?",o:["Provide a sugary snack or drink","Give the patient plenty of water","Keep the patient as cool as possible","Place the patient in the Trendelenburg or supine position"],a:3,e:"The supine (flat on back) or Trendelenburg position (feet elevated) helps maintain blood flow to vital organs in a shock patient. Do NOT give food or drinks (aspiration risk) or cool the patient."},
  {s:'B',c:'Shock',q:"Shock is life-threatening because:",o:["The blood becomes poisonous","The vital organs are not getting adequate oxygen-rich blood","There is not enough blood in the circulatory system","Carbon dioxide is not being released from the tissues in large enough quantities"],a:1,e:"Shock is life-threatening because vital organs (especially the brain, heart, kidneys) are deprived of oxygen-rich blood. Without adequate oxygen, organ cells begin to die."},
  {s:'B',c:'Shock',q:"Why does the skin of someone in shock appear pale and feel cool?",o:["The heart beats faster; therefore, the body's heat is used as energy","The heart slows down; therefore, less heat is produced","The blood vessels constrict in the arms, legs, and skin","The body cools itself to conserve energy"],a:2,e:"In shock, the body shunts blood away from the skin and extremities to protect vital organs. Blood vessel constriction in the arms, legs, and skin causes the characteristic pale, cool, clammy appearance."},
  {s:'B',c:'Shock',q:"Which of the following situations is likely to lead to shock?",o:["A teenager damages her spine in a diving incident","A worker loses his arm to a piece of farming equipment","A child who has the flu has been unable to keep fluids down for several days","All of the above"],a:3,e:"All three can lead to shock: spinal injury → neurogenic shock; traumatic amputation → hemorrhagic shock; prolonged dehydration → hypovolemic shock."},
  {s:'B',c:'Shock',q:"Which of the following is NOT included in the general care for shock?",o:["Administering oxygen","Maintaining normal body temperature","Giving assisted ventilations","Providing rest and reassurance"],a:2,e:"Assisted ventilation is only given if the patient is not breathing adequately — it is not part of the general care for ALL shock patients. Oxygen, temperature management, and reassurance are universal."},

  // Hemorrhage & Soft Tissue Trauma
  {s:'B',c:'Hemorrhage & Soft Tissue Trauma',sc:"After ensuring PPE is on, a worker with a traumatic amputation of his hand is lying on the concrete floor, responsive and in severe pain.",q:"What should your next step be?",o:["Performing a secondary assessment and looking for any other injuries","Bandaging the wrist where the hand was amputated","Taking a set of vital signs","Retrieving the hand from the baler"],a:1,e:"After scene safety and PPE, control of life-threatening bleeding is the immediate priority. Bandaging the amputation site to control hemorrhage comes first — before secondary assessment or vital signs."},
  {s:'B',c:'Hemorrhage & Soft Tissue Trauma',sc:"A worker has had his hand traumatically amputated.",q:"Which of the following conditions will the patient likely develop shortly?",o:["Shock","Hemothorax","Angina","Infection"],a:0,e:"A traumatic amputation causes severe blood loss. Hypovolemic (hemorrhagic) shock is the immediate life threat. Infection may develop later but is not the immediate concern."},
  {s:'B',c:'Hemorrhage & Soft Tissue Trauma',sc:"An older cook slips in a cafeteria. Boiling water lands on her face, neck, and posterior left arm (partial-thickness burns) and her right posterior arm (superficial burns).",q:"Estimate the percentage of her body that has been burned.",o:["9%","18%","27%","36%"],a:1,e:"Using the Rule of Nines: Face/head = 9%, each arm = 9% total (partial burns = partial percentages). Face + neck ≈ 9% + affected arm portions ≈ approximately 18% total body surface area."},
  {s:'B',c:'Hemorrhage & Soft Tissue Trauma',q:"After cooling, what should be put on the burns to keep out air and reduce pain?",o:["Non-stick sterile dressings","Sterile occlusive dressings","More cool cloths","Nothing"],a:0,e:"After cooling a burn for 10-20 minutes, cover with non-stick sterile dressings. Non-stick dressings protect the wound without adhering to damaged skin."},
  {s:'B',c:'Hemorrhage & Soft Tissue Trauma',q:"A sign of external hemorrhage is:",o:["Blood oozing from a wound","Blood that fails to clot after you have tried to control it","Blood spurting from a wound","Both b and c"],a:3,e:"External hemorrhage signs include blood that fails to clot (indicating severe loss) AND blood spurting from a wound (indicating arterial bleeding). Both are serious signs requiring immediate intervention."},
  {s:'B',c:'Hemorrhage & Soft Tissue Trauma',q:"Which of the following is NOT involved in the care for internal hemorrhaging?",o:["Obtaining more advanced medical care","Administering supplemental oxygen","Giving the patient sips of water","Treating the patient for shock"],a:2,e:"Giving sips of water is NOT appropriate for internal hemorrhage — it can cause vomiting and aspiration, and the patient may need surgery. Internal hemorrhage care: call for advanced care, give oxygen, treat for shock."},
  {s:'B',c:'Hemorrhage & Soft Tissue Trauma',q:"If direct pressure and pressure bandages do not stop the bleeding, which of the following can be used as a last resort?",o:["Arterial clamping","A tourniquet","Elastic bandaging","Hyperbaric recompression"],a:1,e:"A tourniquet is the intervention of last resort when direct pressure fails to control limb bleeding. It completely occludes blood flow to the limb."},
  {s:'B',c:'Hemorrhage & Soft Tissue Trauma',q:"Which of the following can a bandage be used for?",o:["Preventing air from reaching a wound","Providing a sterile covering for a wound","Applying pressure to control bleeding","Preventing germs from reaching a wound"],a:2,e:"Bandages are used to apply pressure to control bleeding and to hold dressings in place. Dressings (not bandages) provide sterile coverage."},
  {s:'B',c:'Hemorrhage & Soft Tissue Trauma',q:"If someone has been struck by lightning, which of the following injuries might you suspect?",o:["Burns","Spinal injuries","Entry and exit wounds","All of the above"],a:3,e:"Lightning strike can cause: burns (entry/exit points), spinal injuries (from the fall or muscle contractions), and entry/exit wounds from the electrical current. All three are real risks."},
  {s:'B',c:'Hemorrhage & Soft Tissue Trauma',q:"If a patient has a burn that is black and charred with white tissue in the middle, this is a:",o:["Superficial burn","Partial-thickness burn","Full-thickness burn","None of the above"],a:2,e:"Black, charred, leathery skin with white/grey tissue = full-thickness burn. It destroys all layers of skin. It is often painless at the center because nerve endings are destroyed."},
  {s:'B',c:'Hemorrhage & Soft Tissue Trauma',sc:"A patient has dropped a chemical powder on her foot causing a chemical burn.",q:"What should you do first?",o:["Brush the dry chemicals off the foot using a gloved hand","Cool the area with cool running water","Apply a cold compress to the area","Cover the area with a non-stick sterile dressing"],a:0,e:"For a dry chemical burn, FIRST brush off the dry powder with a gloved hand BEFORE adding water — water can activate some dry chemicals and worsen the burn. Remove the chemical, then irrigate."},
  {s:'B',c:'Hemorrhage & Soft Tissue Trauma',q:"Which of the following patients requires more advanced medical care?",o:["A 35-year-old man with a full-thickness burn on his hand","A 7-year-old child with a sunburn on his back","A 72-year-old woman with a blistered burn on her leg","Both a and c"],a:3,e:"Full-thickness burns always require advanced care. Burns in elderly patients also require advanced care due to reduced skin integrity and healing capacity. Both a and c are correct."},
  {s:'B',c:'Hemorrhage & Soft Tissue Trauma',q:"The area around a recent wound is now red and swollen and feels warm to the touch. This may indicate:",o:["An underlying chronic illness","Severe internal bleeding","An infection","A superficial burn"],a:2,e:"Redness, swelling, and warmth around a wound are the classic signs of infection (the inflammatory response). This is distinct from bruising and indicates bacterial activity in the wound."},
  {s:'B',c:'Hemorrhage & Soft Tissue Trauma',q:"Which of the following patterns is effective for applying an elastic roller bandage to a shoulder or knee?",o:["Triangular pattern","Joint-hook pattern","Extremity-relief pattern","Figure-eight pattern"],a:3,e:"The figure-eight bandaging pattern is the most effective technique for joints like the shoulder and knee. It accommodates the irregular shape of joints while maintaining even pressure."},

  // Musculoskeletal Injuries
  {s:'B',c:'Musculoskeletal Injuries',q:"What should you do when applying a rigid splint to a patient's forearm?",o:["Ensure that it allows the patient's arm to bend at the elbow","Ensure that it does not extend beyond the patient's wrist","Ensure that it applies direct pressure to the injured area","Ensure that it extends from the shoulder to beyond the hand"],a:1,e:"A rigid splint for the forearm should extend from just below the elbow to just beyond the wrist — immobilizing the joint above and below the injury. Direct pressure on the injury is avoided."},
  {s:'B',c:'Musculoskeletal Injuries',sc:"A rugby player has been hit in the legs. One leg is shorter than the other and the foot is pointed outward.",q:"This would indicate:",o:["A hip injury","A broken ankle","A broken femur","Shock"],a:0,e:"A shortened limb with external rotation of the foot is the classic presentation of a hip injury (hip fracture or dislocation). The strong hip muscles pull the bone out of alignment."},
  {s:'B',c:'Musculoskeletal Injuries',sc:"The rugby player has a suspected hip injury.",q:"Which of the following is an appropriate treatment for this injury?",o:["Applying a traction splint","Securing the injured leg to the uninjured leg","Applying a rigid splint","All of the above"],a:1,e:"For a hip injury, buddy-splint the injured leg to the uninjured leg using padding between them for comfort. Traction splints are for femur fractures, not hip injuries."},
  {s:'B',c:'Musculoskeletal Injuries',sc:"A 23-year-old man has tripped and fallen on his arm. The forearm appears deformed and he is holding his arm against his chest.",q:"Which two bones may be broken?",o:["Tibia and fibula","Radius and humerus","Scapula and clavicle","Radius and ulna"],a:3,e:"The forearm contains two bones: the radius and the ulna. A fall on an outstretched arm (FOOSH mechanism) commonly fractures one or both of these bones."},
  {s:'B',c:'Musculoskeletal Injuries',sc:"Splinting the forearm fracture.",q:"When splinting this injury, your splint should:",o:["Immobilize the elbow and wrist","Consist of a sling only","Ensure the arm is straight","Include traction"],a:0,e:"A forearm splint must immobilize the joint ABOVE (elbow) and BELOW (wrist) the fracture site. This is the fundamental rule of splinting — immobilize the joints on either side of the break."},
  {s:'B',c:'Musculoskeletal Injuries',sc:"After splinting, you notice that the fingers are becoming pale and cool.",q:"After splinting, you notice that the fingers are becoming pale and cool. You should:",o:["Treat the patient for shock","Take the splint off and start again","Loosen any bandages or ties","Put a mitten or glove on the hand"],a:2,e:"Pale, cool fingers after splinting = circulation compromised. Loosen the bandages or ties immediately to restore blood flow. Do NOT remove the splint entirely — just release the restricting wrapping."},
  {s:'B',c:'Musculoskeletal Injuries',q:"Applying cold to a musculoskeletal injury is helpful because:",o:["It freezes the skin to numb the pain","It eases pain and discomfort","It decreases the temperature of the area to an optimal healing temperature","It kills any pathogens that may cause infection"],a:1,e:"Cold application reduces swelling (vasoconstriction), eases pain, and decreases tissue inflammation. The RICE method (Rest, Ice, Compression, Elevation) is the standard approach."},
  {s:'B',c:'Musculoskeletal Injuries',q:"Which of the following is NOT a purpose of immobilizing an injury?",o:["To reduce blood flow to the injured limb","To lessen pain","To prevent further damage or injury","To reduce the risk of serious bleeding"],a:0,e:"Reducing blood flow is NOT a goal of immobilization. The goals are: reducing pain, preventing further injury, and reducing bleeding risk (by preventing bone movement)."},
  {s:'B',c:'Musculoskeletal Injuries',q:"When treating a bent knee with a suspected fracture that is painful to move, you should:",o:["Immobilize it in the position found","Return it to the normal anatomical position and then immobilize it","Have the patient extend the leg and hold it in place","Avoid immobilizing the injury"],a:0,e:"When a fractured joint is bent and painful to move, ALWAYS immobilize it in the position found. Never attempt to straighten it — forcing movement can cause neurovascular damage."},
  {s:'B',c:'Musculoskeletal Injuries',q:"Before immobilizing an injured extremity you should always:",o:["Return the limb to the normal anatomical position","Control any external bleeding","Push any exposed bones back under the skin","Elevate the injury"],a:1,e:"Before applying a splint, control any external bleeding first. Do NOT push exposed bone back (causes infection/injury), nor forcibly reposition the limb."},

  // Chest, Abdominal, and Pelvic Injuries
  {s:'B',c:'Chest, Abdominal & Pelvic Injuries',sc:"A construction worker has fallen onto a sharp wooden stake which has punctured his chest. Blood is coming through his jacket. You hear air entering his rib cage with each respiration.",q:"You suspect the stake has caused a:",o:["Fractured rib","Sucking chest wound","Flail chest","Kidney perforation"],a:1,e:"Air entering the chest cavity with each breath (sucking sound) combined with a penetrating chest wound = sucking chest wound (open pneumothorax)."},
  {s:'B',c:'Chest, Abdominal & Pelvic Injuries',sc:"You expose the chest and see a hole on the man's left side. No other wounds are visible.",q:"You should cover the hole with your gloved hand until you are able to cover the wound with:",o:["Sterile gauze","An adhesive bandage","A non-occlusive dressing","A triangular bandage"],a:0,e:"While waiting to apply a proper occlusive dressing, sterile gauze (followed by a three-sided occlusive seal) is the treatment. This stops air entry into the pleural space."},
  {s:'B',c:'Chest, Abdominal & Pelvic Injuries',q:"If air enters the pleural space, what condition may occur?",o:["Flail chest","Hemothorax","Abdominal aortic aneurysm","Pneumothorax"],a:3,e:"Pneumothorax occurs when air enters the pleural space (between the lung and chest wall), causing the lung to partially or fully collapse."},
  {s:'B',c:'Chest, Abdominal & Pelvic Injuries',sc:"A middle-aged man has been stabbed in the abdomen. He is responsive and breathing. His skin is pale and sweaty. There is a large wound just above his navel with part of an organ protruding.",q:"Which of the following should you do?",o:["Cover the protruding organs with a moist sterile dressing","Cover the patient with a dry dressing or towel to maintain warmth","Remove clothing from around the wound","All of the above"],a:0,e:"For evisceration (organ protruding from wound): cover the exposed organs with a MOIST sterile dressing — never push them back in. Keeping them moist prevents tissue drying."},
  {s:'B',c:'Chest, Abdominal & Pelvic Injuries',sc:"The stabbed man with abdominal evisceration.",q:"What is the best position for this patient?",o:["Sitting position","Recovery position","Supine with knees slightly bent","Prone position"],a:2,e:"For abdominal injuries, position the patient supine (on their back) with knees slightly bent. This relaxes the abdominal muscles, reduces pain, and helps prevent further evisceration."},
  {s:'B',c:'Chest, Abdominal & Pelvic Injuries',q:"If someone receives a penetrating trauma about 5 cm (2 in.) below the navel, which organ is most likely to be injured?",o:["Pancreas","Gallbladder","Small intestine","Liver"],a:2,e:"The small intestine occupies most of the lower abdominal cavity and is the most likely organ to be injured by penetrating trauma below the navel. The pancreas, gallbladder, and liver are in the upper abdomen."},
  {s:'B',c:'Chest, Abdominal & Pelvic Injuries',q:"A fractured pelvis may lead to the inability to move or feel the legs. What else can cause the same condition?",o:["Injury to the lower spine","Rupture of the spleen","Fracture of the femur","Heart attack"],a:0,e:"Inability to move or feel the legs can result from injury to the lower spine (spinal cord damage) — the same presentation as a pelvic fracture. Both can compress or damage the nerves supplying the legs."},
  {s:'B',c:'Chest, Abdominal & Pelvic Injuries',q:"Pneumothorax is caused by which of the following entering the pleural space around the lung?",o:["Digestive enzymes","Blood","Air","Tissue"],a:2,e:"Pneumothorax = air in the pleural space. Hemothorax = blood in the pleural space. The air entry collapses the lung by destroying the negative pressure that keeps the lung expanded."},
  {s:'B',c:'Chest, Abdominal & Pelvic Injuries',q:"When treating someone with a closed abdominal injury, the patient's legs should be:",o:["Bent with knees pulled towards the chest","Lower than the patient's head","Raised approximately 15 cm (6 in.)","Slightly bent with a rolled-up blanket or pillow under the knees"],a:3,e:"For closed abdominal injury, place the patient supine with knees slightly bent (supported by a rolled blanket/pillow). This relaxes abdominal muscles and reduces tension and pain."},
  {s:'B',c:'Chest, Abdominal & Pelvic Injuries',q:"To treat flail chest, you should:",o:["Apply bulky dressings to the flail segment","Tightly bind the patient's arm to the chest to form an anatomical splint","Place the patient in the recovery position","Bind the entire chest, ensuring you do not restrict the patient's breathing"],a:0,e:"Flail chest is treated by stabilizing the flail segment with bulky dressings. This limits the paradoxical movement and reduces pain. Never tightly bind the whole chest."},

  // Head and Spinal Injuries
  {s:'B',c:'Head & Spinal Injuries',sc:"A 34-year-old man falls off a ladder 5 metres high. He is on his back, not moving but responsive. A nail is impaled in his eye and there is fluid coming from his ears.",q:"What should you do first?",o:["Immobilize the nail in his eye","Do a head-tilt/chin-lift and check for normal breathing","Put him in the recovery position","Minimize movement of his head and spine"],a:3,e:"A fall from 5 metres is a major spinal MOI. Manual spinal motion restriction (SMR) is the absolute first hands-on priority. The impaled nail is then stabilized in place — never removed."},
  {s:'B',c:'Head & Spinal Injuries',sc:"Fluid is coming from the patient's ears after the fall from the ladder.",q:"Which of the following should you suspect based on the fluid coming from the patient's ears?",o:["An epidural hematoma","A subdural hematoma","A C-spine injury","A skull fracture"],a:3,e:"Fluid (CSF or blood) draining from the ears is a classic sign of a basilar skull fracture. This indicates a serious head injury affecting the base of the skull."},
  {s:'B',c:'Head & Spinal Injuries',q:"In which of the following cases should you NOT attempt in-line stabilization for someone with a suspected spinal injury?",o:["The patient's head is severely angulated to one side","You encounter resistance when attempting to move the head","The patient complains of pain when you attempt to move the head","All of the above"],a:3,e:"Do NOT force in-line stabilization if: the head is severely angulated, you meet resistance, or the patient complains of pain. In these cases, immobilize the head in the position found."},
  {s:'B',c:'Head & Spinal Injuries',q:"A change in which of the following vital signs may indicate a brain injury?",o:["Pupils and level of responsiveness","Pulse and blood pressure","Respiration","All of the above"],a:3,e:"Brain injury can affect all vital signs: pupils (unequal/unreactive), level of responsiveness (decreasing GCS), pulse and blood pressure (Cushing's reflex), and respiration (irregular breathing patterns)."},

  // Acute & Chronic Illnesses
  {s:'B',c:'Acute & Chronic Illnesses',sc:"A 22-year-old male falls at work and shakes uncontrollably with flailing arms and legs, then becomes unresponsive. You arrive just as the shaking stops.",q:"This was most likely:",o:["A diabetic emergency","A seizure","Appendicitis","Syncope"],a:1,e:"Sudden loss of consciousness with violent shaking of limbs (tonic-clonic movements) followed by unresponsiveness is the classic presentation of a generalized (grand mal) seizure."},
  {s:'B',c:'Acute & Chronic Illnesses',sc:"The post-seizure patient's ABCs are all normal. He is drowsy and disoriented.",q:"What stage of the seizure is he in?",o:["Clonic","Aura","Postictal","Tonic"],a:2,e:"The postictal phase follows a seizure — the patient is drowsy, confused, and disoriented. This can last minutes to hours. The aura is before the seizure; tonic and clonic are phases during the seizure."},
  {s:'B',c:'Acute & Chronic Illnesses',sc:"After the seizure.",q:"How long should you remain with the patient?",o:["Until he is fully responsive","Until you've confirmed that his vital signs are normal","Until he is able to respond to painful stimuli","Until he enters the postictal phase"],a:0,e:"Remain with a post-seizure patient until he is fully responsive and alert. Post-seizure patients are vulnerable — they may have another seizure, airway problems, or injuries from the fall."},
  {s:'B',c:'Acute & Chronic Illnesses',sc:"On a hot day, a diabetic man who controls his blood sugar through diet and exercise feels ill after strenuous exercise. He ate a good breakfast but did not account for the strenuous exercise.",q:"You should:",o:["Give him water to drink","Give him a sugary substance","Not allow him to ingest anything","Get him to take his insulin"],a:1,e:"This patient is likely hypoglycemic — strenuous exercise consumes blood glucose rapidly, especially in a diet-controlled diabetic. Give a sugary substance if he is conscious and able to swallow."},
  {s:'B',c:'Acute & Chronic Illnesses',sc:"The diabetic patient does not improve in 10 minutes after receiving sugar.",q:"If the patient does not improve in 10 minutes, you should:",o:["Give him more water","Have him take more insulin","Place him in the rapid transport category","Suspect it is not a diabetic emergency"],a:2,e:"If a diabetic patient does not improve after giving sugar within 10 minutes, place him in the rapid transport category. Non-improvement may indicate a severe hypoglycemic episode requiring IV dextrose."}
];

// Normalise the two slightly-different chapter names so they group together
Q.forEach(q => { if (q.c === 'Acute & Chronic Illness') q.c = 'Acute & Chronic Illnesses'; });

const totalB = Q.filter(q => q.s === 'B').length;
document.getElementById('totalBCount').textContent = totalB;

// Build topic buttons dynamically
const TOPICS = [...new Set(Q.filter(q => q.s === 'B').map(q => q.c))];
const topicsGrid = document.getElementById('topicsGrid');
TOPICS.forEach(topic => {
  const count = Q.filter(q => q.s === 'B' && q.c === topic).length;
  const btn = document.createElement('button');
  btn.className = 'topic-btn';
  btn.innerHTML = `<span class="topic-name">${topic}</span><span class="topic-count">${count}q</span>`;
  btn.onclick = () => startSection(topic);
  topicsGrid.appendChild(btn);
});

// ── State ──────────────────────────────────────────────────────────────
let activeQ = [], cur = 0, score = 0, scoreA = 0, scoreB = 0, done = false, currentMode = null;
const L = ['A','B','C','D'];

// ── Splash helpers ─────────────────────────────────────────────────────
function toggleTopics() {
  const panel = document.getElementById('topicsPanel');
  const btn   = document.getElementById('topicsToggleBtn');
  const open  = panel.style.display !== 'none';
  panel.style.display = open ? 'none' : 'block';
  btn.textContent = open ? 'Browse by Topic ↓' : 'Browse by Topic ↑';
}

// ── Start a mode ───────────────────────────────────────────────────────
function startSection(mode) {
  currentMode = mode;
  cur = 0; score = 0; scoreA = 0; scoreB = 0; done = false;

  if      (mode === 'A')    activeQ = Q.filter(q => q.s === 'A');
  else if (mode === 'B')    activeQ = Q.filter(q => q.s === 'B');
  else if (mode === 'full') activeQ = [...Q];
  else                      activeQ = Q.filter(q => q.s === 'B' && q.c === mode);

  document.getElementById('splash').style.display = 'none';
  document.getElementById('quiz').style.display   = 'block';
  render();
}

// ── Render current question ────────────────────────────────────────────
function render() {
  done = false;
  const q = activeQ[cur];

  document.getElementById('progressBar').style.width = ((cur / activeQ.length) * 100) + '%';
  document.getElementById('qNum').textContent = `Q${cur+1} / ${activeQ.length}`;
  document.getElementById('chapterTag').textContent = q.c;

  let label;
  if      (currentMode === 'full') label = `Section ${q.s} — ${q.s === 'A' ? 'Past Exam Questions' : 'Practice Questions'}`;
  else if (currentMode === 'A')    label = 'Section A — Past Exam Questions';
  else if (currentMode === 'B')    label = 'Section B — Practice Questions';
  else                             label = currentMode;
  document.getElementById('sectionLabel').textContent = label;

  const liveScore = currentMode === 'full' ? scoreA + scoreB : score;
  document.getElementById('scoreLive').innerHTML = `Score: <span>${liveScore}</span>`;

  const sb = document.getElementById('scenarioBox');
  sb.innerHTML = q.sc ? `<div class="scenario-box"><strong>Scenario</strong>${q.sc}</div>` : '';

  document.getElementById('qText').textContent = q.q;

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  q.o.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = `<span class="opt-letter">${L[i]}</span><span class="opt-text">${o}</span>`;
    b.onclick = () => pick(i, b);
    opts.appendChild(b);
  });

  document.getElementById('resultBanner').style.display = 'none';
  document.getElementById('explanation').style.display  = 'none';
  document.getElementById('nextBtn').style.display      = 'none';

  const card = document.getElementById('qCard');
  card.style.animation = 'none';
  requestAnimationFrame(() => card.style.animation = '');
}

// ── Answer selection ───────────────────────────────────────────────────
function pick(chosen, btn) {
  if (done) return;
  done = true;
  const q = activeQ[cur];
  document.querySelectorAll('.opt').forEach(o => o.classList.add('disabled'));

  const banner = document.getElementById('resultBanner');
  const exp    = document.getElementById('explanation');

  if (chosen === q.a) {
    btn.classList.add('correct');
    banner.className = 'result-banner correct-banner';
    banner.textContent = '✓ Correct!';
    if (currentMode === 'full') { if (q.s === 'A') scoreA++; else scoreB++; }
    else score++;
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt')[q.a].classList.add('correct');
    banner.className = 'result-banner wrong-banner';
    banner.textContent = `✗ Incorrect — the correct answer is ${L[q.a]}`;
  }

  banner.style.display = 'flex';
  exp.innerHTML = `<strong>Explanation:</strong> ${q.e}`;
  exp.style.display = 'block';

  const nb = document.getElementById('nextBtn');
  nb.style.display = 'inline-block';
  nb.textContent = cur < activeQ.length - 1 ? 'Next Question →' : 'See Results →';

  const liveScore = currentMode === 'full' ? scoreA + scoreB : score;
  document.getElementById('scoreLive').innerHTML = `Score: <span>${liveScore}</span>`;
}

function nextQuestion() {
  cur++;
  if (cur >= activeQ.length) showResults();
  else render();
}

// ── Results ────────────────────────────────────────────────────────────
function pillClass(p) { return p >= 80 ? 'pass' : p >= 60 ? 'needs-work' : 'fail'; }

function showResults() {
  document.getElementById('quiz').style.display = 'none';
  const r = document.getElementById('results');
  r.style.display = 'flex';

  let heading;
  if      (currentMode === 'full') heading = 'Full Quiz Complete! 🎉';
  else if (currentMode === 'A')    heading = 'Section A Complete! 🎉';
  else if (currentMode === 'B')    heading = 'Section B Complete! 🎉';
  else                             heading = `${currentMode} — Complete! 🎉`;
  document.getElementById('resultsHeading').textContent = heading;

  const content = document.getElementById('resultsContent');

  if (currentMode === 'full') {
    const pA = Math.round((scoreA / 50) * 100);
    const pB = Math.round((scoreB / totalB) * 100);
    const pT = Math.round(((scoreA + scoreB) / activeQ.length) * 100);
    content.innerHTML = `
      <div class="results-grid">
        <div class="result-card">
          <div class="sec-title">Section A</div>
          <div class="big-score">${scoreA}</div>
          <div class="out-of">out of 50</div>
          <div class="percent-pill ${pillClass(pA)}">${pA}%</div>
        </div>
        <div class="result-card">
          <div class="sec-title">Section B</div>
          <div class="big-score">${scoreB}</div>
          <div class="out-of">out of ${totalB}</div>
          <div class="percent-pill ${pillClass(pB)}">${pB}%</div>
        </div>
      </div>
      <div class="total-card">
        <div class="sec-title" style="margin-bottom:8px;">Total Score</div>
        <div class="big-score">${scoreA + scoreB}</div>
        <div class="out-of">out of ${activeQ.length}</div>
        <div class="percent-pill ${pillClass(pT)}" style="margin-top:12px;">${pT}%</div>
      </div>`;
  } else {
    const total = activeQ.length;
    const p     = Math.round((score / total) * 100);
    let title;
    if      (currentMode === 'A') title = 'Section A — Past Exam Questions';
    else if (currentMode === 'B') title = 'Section B — Practice Questions';
    else                          title = currentMode;
    content.innerHTML = `
      <div class="result-card single-result">
        <div class="sec-title">${title}</div>
        <div class="big-score">${score}</div>
        <div class="out-of">out of ${total}</div>
        <div class="percent-pill ${pillClass(p)}">${p}%</div>
      </div>`;
  }
}

// ── Post-results navigation ────────────────────────────────────────────
function tryAgain() {
  document.getElementById('results').style.display = 'none';
  cur = 0; score = 0; scoreA = 0; scoreB = 0;
  document.getElementById('quiz').style.display = 'block';
  render();
}

function goHome() {
  document.getElementById('results').style.display = 'none';
  document.getElementById('topicsPanel').style.display = 'none';
  document.getElementById('topicsToggleBtn').textContent = 'Browse by Topic ↓';
  document.getElementById('splash').style.display = 'flex';
}
</script>
</body>
</html>
